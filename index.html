<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inverde Veldsleutels</title>
<style>

  body {
    font-family: -apple-system, system-ui, sans-serif;
    line-height: 1.4;
    max-width: 900px;
    margin: 10px auto;
    padding: 15px;
    color: #000000; /* Pure black text for contrast */
    background: #ffffff; /* Pure white background */
    font-size: 27px; /* 1.5x Bigger base size */
  }

  h1 { font-size: 2.2rem; color: #1a365d; border-bottom: 5px solid #27ae60; padding-bottom: 10px; }
  h2 { font-size: 1.8rem; margin-top: 1.5rem; color: #1a202c; }
  h3 { font-size: 1.5rem; color: #2d3748; }

  /* Index Grid */
  .index-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
    margin-top: 40px;
  }

  .index-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 120px;
    background: #f8fafc;
    border: 4px solid #1a365d; /* High contrast border */
    border-radius: 20px;
    font-size: 1.8rem;
    text-decoration: none;
    color: #1a365d;
    font-weight: 900;
    box-shadow: 0 6px 0 #1a365d;
  }
  .index-btn:active { transform: translateY(4px); box-shadow: none; }

  /* Containers */
  .step-container {
    background: #ffffff;
    padding: 25px;
    margin-bottom: 40px;
    border-radius: 15px;
    border: 3px solid #e2e8f0;
    border-left: 15px solid #27ae60; /* Thicker accent for visibility */
  }

  .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .step-number { background: #27ae60; color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 1.2rem; }
  .incoming-link { background: #2d3748; color: white; text-decoration: none; padding: 6px 14px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; }

  /* Question & Background */
  .question { font-size: 1.8rem; font-weight: 800; margin: 25px 0; color: #000; line-height: 1.2; }
  .background-box { background: #f0fdf4; border: 3px solid #27ae60; padding: 20px; border-radius: 10px; font-size: 1.2rem; color: #064e3b; margin-bottom: 20px; }

  /* Answers */
  .answer-block { margin-bottom: 35px; }

  .answer-link, .answer-link-terminal {
    display: block;
    background: #ffffff;
    border: 4px solid #2d3748;
    padding: 22px 25px;
    text-decoration: none;
    color: #1a365d;
    border-radius: 15px;
    font-weight: 700;
    font-size: 1.4rem;
    box-shadow: 0 6px 0 #2d3748;
  }

  .answer-link:active { transform: translateY(4px); box-shadow: none; }
  .answer-link-terminal { color: #000; background: #ecfdf5; border-color: #059669; box-shadow: none; cursor: default; }

  /* Details Grouping */
  .has-details { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: 4px dashed #2d3748; }

  .answer-details-group {
    background: #f8fafc;
    border: 4px solid #2d3748;
    border-top: none;
    border-radius: 0 0 15px 15px;
    padding: 20px;
  }

  .extra-info {
    background: #fff;
    border-left: 10px solid #2563eb;
    padding: 15px;
    margin-bottom: 15px;
    font-size: 1.2rem;
    color: #1e3a8a;
    font-weight: 500;
  }

  /* Result Box - High Impact */
  .result-box {
    background: #064e3b;
    color: #ffffff;
    padding: 20px;
    border-radius: 12px;
    font-size: 1.3rem;
    margin-top: 15px;
    border: 2px solid #000;
  }
  .result-box strong { color: #4ade80; text-transform: uppercase; font-size: 1rem; display: block; margin-bottom: 5px; }

  .answer-remark { font-style: italic; font-size: 1.1rem; color: #475569; padding-top: 10px; border-top: 2px solid #e2e8f0; }
  .other-key { background: #fffbeb; border: 3px solid #b45309; color: #78350f; padding: 15px; border-radius: 10px; font-size: 1.1rem; margin-top: 15px; font-weight: bold;}

  .back-to-index { display: inline-block; padding: 15px 30px; background: #2d3748; text-decoration: none; border-radius: 12px; color: #ffffff; font-weight: 900; font-size: 1.2rem; }
  
  </style></head>
<body>
  <h1 style="margin-top:20px;">Veldsleutels Index</h1>
  <div class="index-grid">
<a href="www/bos.html" class="index-btn">BOS</a><a href="www/grasland.html" class="index-btn">GRASLAND</a><a href="www/heide.html" class="index-btn">HEIDE</a><a href="www/moeras.html" class="index-btn">MOERAS</a><a href="www/water.html" class="index-btn">WATER</a>  </div>
</body>
</html>
